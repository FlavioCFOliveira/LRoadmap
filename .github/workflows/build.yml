name: Build Cross-Platform Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Build
        run: zig build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmp-x86_64-linux
          path: zig-out/x86_64-linux/bin/rmp

  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Build
        run: zig build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmp-aarch64-linux
          path: zig-out/aarch64-linux/bin/rmp

  build-macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install SQLite
        run: brew install sqlite3
      - name: Build
        run: zig build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmp-x86_64-macos
          path: zig-out/x86_64-macos/bin/rmp

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Install SQLite
        run: brew install sqlite3
      - name: Build
        run: zig build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmp-aarch64-macos
          path: zig-out/aarch64-macos/bin/rmp

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Download SQLite Amalgamation
        shell: powershell
        run: |
          # Download SQLite amalgamation source
          $sqliteVersion = "3510300"
          $url = "https://sqlite.org/2026/sqlite-amalgamation-$sqliteVersion.zip"
          Invoke-WebRequest -Uri $url -OutFile "sqlite.zip"
          # Extract to temp directory
          $tempDir = "sqlite-temp"
          Expand-Archive -Path "sqlite.zip" -DestinationPath $tempDir
          # Remove existing sqlite3-src if present
          if (Test-Path "sqlite3-src") { Remove-Item -Recurse -Force "sqlite3-src" }
          # Move the extracted folder to sqlite3-src
          Move-Item -Path "$tempDir\sqlite-amalgamation-$sqliteVersion" -Destination "sqlite3-src"
          # Cleanup
          Remove-Item -Recurse -Force $tempDir
          Remove-Item "sqlite.zip"
          # Verify files
          Get-ChildItem "sqlite3-src"
      - name: Build
        shell: powershell
        run: |
          # Set environment variable for build.zig to detect
          $env:SQLITE_SOURCE = "$PWD\sqlite3-src"
          Write-Host "SQLITE_SOURCE = $env:SQLITE_SOURCE"
          zig build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmp-x86_64-windows
          path: zig-out/x86_64-windows/bin/rmp.exe

  build-windows-aarch64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2
      - name: Download SQLite Amalgamation
        shell: powershell
        run: |
          # Download SQLite amalgamation source
          $sqliteVersion = "3510300"
          $url = "https://sqlite.org/2026/sqlite-amalgamation-$sqliteVersion.zip"
          Invoke-WebRequest -Uri $url -OutFile "sqlite.zip"
          # Extract to temp directory
          $tempDir = "sqlite-temp"
          Expand-Archive -Path "sqlite.zip" -DestinationPath $tempDir
          # Remove existing sqlite3-src if present
          if (Test-Path "sqlite3-src") { Remove-Item -Recurse -Force "sqlite3-src" }
          # Move the extracted folder to sqlite3-src
          Move-Item -Path "$tempDir\sqlite-amalgamation-$sqliteVersion" -Destination "sqlite3-src"
          # Cleanup
          Remove-Item -Recurse -Force $tempDir
          Remove-Item "sqlite.zip"
          # Verify files
          Get-ChildItem "sqlite3-src"
      - name: Build
        shell: powershell
        run: |
          # Set environment variable for build.zig to detect
          $env:SQLITE_SOURCE = "$PWD\sqlite3-src"
          Write-Host "SQLITE_SOURCE = $env:SQLITE_SOURCE"
          zig build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmp-aarch64-windows
          path: zig-out/aarch64-windows/bin/rmp.exe

  # Continuous Release on main branch (overwrites previous dev release)
  dev-release:
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos-x86_64, build-macos-aarch64, build-windows-x86_64, build-windows-aarch64]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rmp-*
          merge-multiple: false

      - name: Organize artifacts
        run: |
          mkdir -p release
          cp artifacts/rmp-x86_64-linux/rmp release/rmp-x86_64-linux
          cp artifacts/rmp-aarch64-linux/rmp release/rmp-aarch64-linux
          cp artifacts/rmp-x86_64-macos/rmp release/rmp-x86_64-macos
          cp artifacts/rmp-aarch64-macos/rmp release/rmp-aarch64-macos
          cp artifacts/rmp-x86_64-windows/rmp.exe release/rmp-x86_64-windows.exe
          cp artifacts/rmp-aarch64-windows/rmp.exe release/rmp-aarch64-windows.exe
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Update Dev Release
        uses: softprops/action-gh-release@v1
        with:
          name: Development Build (latest)
          tag_name: dev
          draft: false
          prerelease: true
          files: release/*
          generate_release_notes: false
          body: |
            ## LRoadmap Development Build

            This is an automated build from the latest commit on `main`.

            ### Binaries
            - `rmp-x86_64-linux` - Linux x86_64
            - `rmp-aarch64-linux` - Linux ARM64
            - `rmp-x86_64-macos` - macOS x86_64 (Intel)
            - `rmp-aarch64-macos` - macOS ARM64 (Apple Silicon)
            - `rmp-x86_64-windows.exe` - Windows x86_64
            - `rmp-aarch64-windows.exe` - Windows ARM64

            ### Installation
            Download the binary for your platform and add it to your PATH.

            ### Verification
            Check the `checksums.txt` file for SHA256 hashes.

            ### Commit
            ${{ github.sha }}

  # Release on tags (v*)
    needs: [build-linux-x86_64, build-linux-aarch64, build-macos-x86_64, build-macos-aarch64, build-windows-x86_64, build-windows-aarch64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rmp-*
          merge-multiple: false

      - name: Organize artifacts
        run: |
          mkdir -p release
          cp artifacts/rmp-x86_64-linux/rmp release/rmp-x86_64-linux
          cp artifacts/rmp-aarch64-linux/rmp release/rmp-aarch64-linux
          cp artifacts/rmp-x86_64-macos/rmp release/rmp-x86_64-macos
          cp artifacts/rmp-aarch64-macos/rmp release/rmp-aarch64-macos
          cp artifacts/rmp-x86_64-windows/rmp.exe release/rmp-x86_64-windows.exe
          cp artifacts/rmp-aarch64-windows/rmp.exe release/rmp-aarch64-windows.exe
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release/*
          generate_release_notes: true
          body: |
            ## LRoadmap ${{ github.ref_name }}

            ### Binaries
            - `rmp-x86_64-linux` - Linux x86_64
            - `rmp-aarch64-linux` - Linux ARM64
            - `rmp-x86_64-macos` - macOS x86_64 (Intel)
            - `rmp-aarch64-macos` - macOS ARM64 (Apple Silicon)
            - `rmp-x86_64-windows.exe` - Windows x86_64
            - `rmp-aarch64-windows.exe` - Windows ARM64

            ### Installation
            Download the binary for your platform and add it to your PATH.

            ### Verification
            Check the `checksums.txt` file for SHA256 hashes.
